# Build and test all Rust crates, plus the WASM frontend.
# Runs on every push and pull request to catch breakage early.

name: Build & Test

on:
  push:
  pull_request:

jobs:
  # Check + test native crates (core, backend, tools/admin).
  # frontend is excluded here because it targets wasm32 only.
  native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (openssl, pkg-config, cmake for libgit2)
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev cmake

      # Check all native-target members; exclude the wasm-only frontend crate.
      - name: cargo check (native crates)
        run: cargo check --workspace --exclude chorgly-frontend

      - name: cargo test (core)
        run: cargo test -p chorgly-core

  # Build the WASM frontend with wasm-pack.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: wasm-pack build
        working-directory: src/frontend
        run: wasm-pack build --target web --out-dir ../../docs/pkg
