# Build and optionally push the Docker image to GitHub Container Registry.
#
# Tagging strategy (per issue #3):
#   - push to main       → ghcr.io/marenamat/chorgly:main
#   - push to a branch   → ghcr.io/marenamat/chorgly:<branch-name>
#   - push of a v* tag   → ghcr.io/marenamat/chorgly:<version>
#   - latest stable tag  → ghcr.io/marenamat/chorgly:latest  (only non-pre-release v* tags)
#
# All runs build the image; non-main/non-tag branches also push so the
# human guardian can inspect the result before merging.

name: Docker

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from the event context:
      #   branch push  → sanitised branch name
      #   version tag  → semver tag + (if not pre-release) latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/marenamat/chorgly
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
